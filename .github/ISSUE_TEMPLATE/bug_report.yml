name: 🐛 Bug 报告
description: 报告文档错误、链接失效或其他问题
title: "[BUG] "
labels: ["bug"]
body:
  - type: input
    attributes:
      label: 问题位置
      description: 出现问题的文档或页面链接
      placeholder: https://github.com/JackSmith111977/Knowledge-Base/blob/main/...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 问题描述
      description: 请详细描述你遇到的问题
      placeholder: 我发现了... / 我希望...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期结果
      description: 你认为正确的结果应该是什么
    validations:
      required: true
  - type: textarea
    attributes:
      label: 实际结果
      description: 实际发生的情况
    validations:
      required: true
  - type: input
    attributes:
      label: 发现日期
      description: 什么时候发现的这个问题
      placeholder: "2026-03-27"
  - type: checkboxes
    attributes:
      label: 确认事项
      options:
        - label: 我已经搜索了现有的 Issue，确认这不是重复的问题
          required: true
        - label: 我愿意协助解决这个问题（如提供更多信息或参与修复）
